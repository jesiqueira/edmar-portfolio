<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- SEO padrão -->
        <title>
            {% block title %}Edmar Siqueira — Desenvolvedor Python & Automação{% endblock %}
        </title>
        <meta name="description"
              content="{% block description %}Portfólio de Edmar Siqueira — Desenvolvedor especializado em Python, automação, APIs e soluções inteligentes.{% endblock %}">
        <meta name="author" content="Edmar Siqueira">
        <meta name="language" content="pt-BR">
        <!-- Open Graph (WhatsApp, LinkedIn, Facebook) -->
        <meta property="og:title"
              content="{% block og_title %}Edmar Siqueira — Desenvolvedor Python & Automação{% endblock %}">
        <meta property="og:description"
              content="{% block og_description %}Portfólio com projetos, serviços e soluções modernas em Python e automação.{% endblock %}">
        <meta property="og:image" content="/static/img/og-image.webp">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://edmarsiqueira.dev">
        <meta property="og:locale" content="pt_BR">
        <!-- Fallback para WhatsApp -->
        <meta property="og:image:alt" content="Edmar Siqueira - Portfólio">
        <meta property="og:image:width" content="800">
        <meta property="og:image:height" content="800">
        <meta property="og:image:secure_url" content="/static/img/preview.webp">
        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title"
              content="{% block twitter_title %}Edmar Siqueira — Desenvolvedor Python & Automação{% endblock %}">
        <meta name="twitter:description"
              content="{% block twitter_description %}Portfólio com projetos, serviços e soluções modernas em Python e automação.{% endblock %}">
        <meta name="twitter:image" content="/static/img/og-twitter.webp">
        <!-- Favicon social -->
        <link rel="icon"
              type="image/webp"
              sizes="512x512"
              href="/static/img/favicon-social.webp">
        <!-- Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-slate-950 text-slate-100">
        <!-- NAVBAR COM DEGRADÊ + SCROLL EFFECT -->
        <header id="navbar"
                class="fixed top-0 left-0 w-full z-50 bg-gradient-to-b from-slate-900/60 to-transparent transition-all duration-300">
            <nav class="max-w-5xl mx-auto flex items-center justify-between px-4 py-4">
                <!-- Logo -->
                <a href="{{ url_for("home.home") }}"
                   class="text-lg font-semibold tracking-tight text-slate-200">Edmar Siqueira</a>
                <!-- Botão Mobile -->
                <button id="menu-btn" class="md:hidden flex flex-col gap-1.5">
                    <span class="block w-6 h-0.5 bg-slate-200 transition-all duration-300"></span>
                    <span class="block w-6 h-0.5 bg-slate-200 transition-all duration-300"></span>
                    <span class="block w-6 h-0.5 bg-slate-200 transition-all duration-300"></span>
                </button>
                <!-- Links desktop -->
                <div class="hidden md:flex items-center gap-6 text-sm text-slate-300">
                    <a href="{{ url_for("home.home") }}"
                       class="hover:text-sky-400 transition-colors">Início</a>
                    <a href="{{ url_for("projects.projects") }}"
                       class="hover:text-sky-400 transition-colors">Projetos</a>
                    <a href="{{ url_for("services.services") }}"
                       class="hover:text-sky-400 transition-colors">Serviços</a>
                    <a href="{{ url_for("contact.contact") }}"
                       class="hover:text-sky-400 transition-colors">Contato</a>
                </div>
                <!-- Botão CTA -->
                <a href="{{ url_for("contact.contact") }}"
                   class="hidden md:inline-flex text-sm px-4 py-2 rounded-md bg-sky-500 hover:bg-sky-400 text-slate-950 font-medium transition-colors">
                    Vamos conversar
                </a>
            </nav>
            <!-- MENU MOBILE -->
            <div id="mobile-menu"
                 class="hidden flex-col gap-4 px-4 py-6 bg-slate-900/95 backdrop-blur border-b border-slate-800 md:hidden opacity-0 -translate-y-4 transition-all duration-300">
                <a href="{{ url_for("home.home") }}"
                   class="text-lg text-slate-200 ml-2 opacity-0 translate-y-2 transition-all duration-300 hover:text-sky-400">Início</a>
                <a href="{{ url_for("projects.projects") }}"
                   class="text-lg text-slate-200 ml-2 opacity-0 translate-y-2 transition-all duration-300 hover:text-sky-400">Projetos</a>
                <a href="{{ url_for("services.services") }}"
                   class="text-lg text-slate-200 ml-2 opacity-0 translate-y-2 transition-all duration-300 hover:text-sky-400">Serviços</a>
                <a href="{{ url_for("contact.contact") }}"
                   class="text-lg text-slate-200 ml-2 opacity-0 translate-y-2 transition-all duration-300 hover:text-sky-400">Contato</a>
                <a href="{{ url_for("contact.contact") }}"
                   id="mobile-cta"
                   class="mt-2 ml-5 text-sm px-4 py-2 rounded-md bg-sky-500 text-slate-950 font-medium opacity-0 translate-y-2 transition-all duration-300 hover:bg-sky-400 w-fit">
                    Vamos conversar
                </a>
            </div>
        </header>
        <!-- CONTEÚDO DAS PÁGINAS -->
        <main class="max-w-5xl mx-auto px-4 pt-28">
            {% block content %}{% endblock %}
        </main>
        <!-- FOOTER -->
        <footer class="py-10 bg-[#0d1117] border-t border-gray-800 text-center">
            <p class="text-gray-500 text-sm">© {{ current_year }} Edmar Siqueira — Desenvolvedor Python & Automação</p>
        </footer>
        <!-- SCRIPT DO EFEITO DE SCROLL -->
        <script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
    </body>
</html>
