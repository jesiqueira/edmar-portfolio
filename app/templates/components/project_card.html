<div class="project-card opacity-0 translate-y-4 transition-all duration-700 bg-slate-900/60 border border-slate-800 rounded-xl overflow-hidden hover:border-sky-500/40">
    <img src="{{ project.image }}"
         class="w-full h-40 object-cover"
         alt="Imagem do projeto" />
    <div class="p-4">
        <h2 class="text-lg font-semibold text-slate-100">{{ project.title }}</h2>
        <p class="text-slate-400 text-sm mt-1">{{ project.description }}</p>
        <div class="flex flex-wrap gap-2 mt-3">
            {% for tag in project.tags %}
                <span class="px-2 py-1 text-xs bg-slate-800 text-slate-300 rounded">{{ tag }}</span>
            {% endfor %}
        </div>
        <div class="flex items-center gap-3 mt-4">
            <a href="/projects/{{ project.title | lower | replace(' ', '-') | replace('–', '-') | replace('—', '-') }}"
               class="text-sm text-sky-400 hover:text-sky-300">Ver projeto →</a>
            <a href="{{ project.github }}"
               class="text-sm text-slate-400 hover:text-slate-300">GitHub</a>
        </div>
    </div>
</div>
